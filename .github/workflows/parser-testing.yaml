name: C++ Tests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile tests
      working-directory: parser/testing
      run: g++ -std=c++20 -Wall -o correctness_test correctness_test.cpp

    - name: Run tests
      working-directory: parser/testing
      run: ./correctness_test